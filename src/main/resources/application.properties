server.port=8008
spring.application.name=ProjectBanking

spring.datasource.url=jdbc:postgresql://localhost:5432/banking_project
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Bakong integration
# Set the real API URL and provide the token via the BAKONG_API_TOKEN environment variable
bakong.api.url=https://api.bakong.example
bakong.api.token=${BAKONG_API_TOKEN:}
